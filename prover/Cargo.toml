[package]
name = "zero-chain-prover"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "prover"
path = "src/main.rs"

[dependencies]
# Your circuits
transfer-circuit = { path = "../circuits/transfer" }
origin-circuit = { path = "../circuits/origin" }

# Crypto
zc-crypto = { workspace = true }
zk-types = { workspace = true }

# Arkworks for Groth16
ark-bn254 = "0.5"
ark-groth16 = "0.5"
ark-serialize = "0.5"
ark-std = { version = "0.5", features = ["std"] }  # Add std feature
ark-ff = "0.5"
ark-snark = "0.5"  # ADD THIS

# CLI
clap = { version = "4.5", features = ["derive"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"

# File I/O
bincode = "1.3"

# Logging
env_logger = "0.11"
log = "0.4"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

[dev-dependencies]
tempfile = "3.10"